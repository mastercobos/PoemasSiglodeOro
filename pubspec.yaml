name: poemas_app
description: Antología poética con índice por autor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.3.0
  provider: ^6.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/poemas.json

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.3.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/gafas_bigote.png"
  min_sdk_android: 21
  adaptive_icon_background: "#150e0e"
  adaptive_icon_foreground: "assets/icon/gafas_bigote.png"
  android_notification_icon: false

flutter_native_splash:
  color: "#150e0e"
  image: assets/icon/gafas_bigote_splash.png

  android: true
  ios: true

  android_12:
    color: "#150e0e"
    image: assets/icon/gafas_bigote_splash.png
    icon_background_color: "#150e0e"